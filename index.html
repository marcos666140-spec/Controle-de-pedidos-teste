<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pedidos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="topBar">
      <span class="titulo">Pedidos</span>
      <button id="btnBusca">🔎</button>
    </div>
    <input type="text" id="campoBusca" placeholder="Buscar produto...">
  </header>

  <!-- Container principal para todos os setores -->
  <div id="setores"></div>

  <!-- Backup / Export / Import -->
  <div class="backupBtns">
    <button id="exportarBtn">📤 Exportar</button>
    <button id="importarBtn">📥 Importar</button>
    <input type="file" id="importarArquivo" accept=".json" hidden>
  </div>

  <!-- Script principal -->
  <script src="script.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</body>
</html>
